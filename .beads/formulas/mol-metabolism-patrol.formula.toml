description = """
Autonomous KB evolution patrol.

Runs `go run ./cmd/metabolism --evolve .` which executes the full evolution cycle:
1. Sense (wake): topology → sensor queries (ZIM + RSS + arXiv) with content snippets
2. Evaluate: auto-resolve pending hypotheses via content-aware LLM classification
3. Ingest: quality-gated pipeline ingest from corroborated ZIM findings → new corpus .go files
4. Dream (NREM): consolidation analysis + bias audit + auto-fix overlong Briefs
5. Trip (REM): speculative cross-cluster connections via LLM
6. Calibrate: prediction accuracy scoring + reify predictions.go

Sensor config is in `.metabolism.json` (ZIM path, backend, RSS feeds).
No CLI flags needed beyond `--cycle .`.

## Polecat Contract

Each patrol run is one complete sleep cycle. The cycle is self-contained:
- Sensor queries are logged to `.metabolism-log.json`
- Dream auto-fixes are quality-gated (build + vet + lint; reverts on failure)
- Trip connections are scored 1-5 (only 3+ are interesting)
- Calibrate reifies predictions.go and verifies `go build` passes
- The cycle commits predictions.go changes automatically

Your job: run the cycle, commit any residual changes, push, `gt done`.

## Running between human sessions

This formula is designed to run autonomously between human work sessions.
The human starts it, it runs N cycles, then suspends. The human resumes
when ready.

OOM survival: setup pre-builds `./metabolism` so the cycle loop never
re-runs the Go toolchain (which peaks 1-2 GB RSS during link).
Without this, batched cycles + Claude Code + tmux on a 14 GB host
push the cgroup over `systemd-oomd`'s threshold and the entire
polecat scope gets oom-killed mid-run. Empirically observed
2026-04-27 — see commit history.

Key invariants:
- Never modify corpus .go files (only predictions.go and metabolism_cycle*.go)
- Never exceed entity cap (250)
- Always leave the repo in a buildable state
- Each cycle commits and pushes DIRECTLY to main (rebase on top of latest first).
  Branch protection allows this; CI was dropped as a duplicate gate since
  build/vet/lint run locally per cycle. Bad commits land on main but are
  trivially revertable as single commits — that's the whole point of
  per-cycle pushes vs. weeklong PRs.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | hook_bead | The bead tracking this patrol run |
| cycles | sling vars | Number of cycles to run (default: 1) |
| base_branch | sling vars | Branch to work on (default: main) |
"""
formula = "mol-metabolism-patrol"
version = 1

[[steps]]
id = "setup"
title = "Verify prerequisites"
description = """
**1. Check environment:**
```bash
# Sensor config exists
cat .metabolism.json

# Source .env so EVERY exported var (ANTHROPIC_API_KEY, KAGI_API_KEY,
# METABOLISM_BUDGET_CENTS, ...) propagates into the polecat shell.
# `set -a` flips the shell into auto-export mode; `set +a` restores it.
# Without this, only the var the polecat manually re-exports lands in
# child processes — and the budget guard reads METABOLISM_BUDGET_CENTS
# via os.Getenv, so a missed export means the cap silently no-ops.
RIG_ROOT="$(git worktree list --porcelain | head -1 | sed 's/worktree //')"
if [ -f .env ]; then set -a; source .env; set +a
elif [ -f "$RIG_ROOT/.env" ]; then set -a; source "$RIG_ROOT/.env"; set +a
fi
test -n "$ANTHROPIC_API_KEY" || echo "WARNING: ANTHROPIC_API_KEY not set — auto-resolve/trip/dream-fix will be skipped"
test -n "$METABOLISM_BUDGET_CENTS" || echo "WARNING: METABOLISM_BUDGET_CENTS not set — running with no spend cap"

# KB builds
go build ./...

# Pre-build the metabolism binary so the cycle loop doesn't fork the
# Go toolchain twice per iteration. `go run` peaks 1-2 GB during link;
# stacked across batched cycles plus Claude Code + tmux this trips
# systemd-oomd on 14 GB hosts. A pre-built binary is ~80% smaller in
# RSS and cycle execution stays in-process for `--evolve` /
# `--calibrate-trend`. The output `./metabolism` is gitignored already.
go build -o ./metabolism ./cmd/metabolism
ls -la ./metabolism
```

**2. Check current state:**
```bash
go run ./cmd/query --stats .
```

**Exit criteria:** Config exists, API key set, KB builds."""

[[steps]]
id = "run-cycles"
title = "Execute sleep cycles"
needs = ["setup"]
description = """
## CRITICAL: this step is long-running by design

The {{cycles}} target is BINDING, not advisory. Empirically (2026-04-27),
polecats interpret "I ran some cycles" as "task complete" and call
`gt done` after 2-3 iterations even with cycles=168 set. That defeats the
purpose of using gt for long-running cycle work. Read the rules below
before executing — they exist because past polecats got this wrong.

### Rule 1: BATCHING IS REQUIRED, AND BATCHES MUST CHAIN

Claude Code's Bash tool has a 10-minute hard timeout. A 168-cycle loop
with hourly sleep is 7 days. You CANNOT run all cycles in one Bash call.
Batch in groups of 3-4 cycles per Bash call, with timeout=600000.

After each batch returns, you MUST IMMEDIATELY start another Bash call
to run the next batch. Do not interpret a returning batch as "all
cycles complete." Track `cycles_completed` in `.metabolism-tick-progress`
(gitignored, polecat-clone-local) and read it at the top of each batch
to know where to resume.

### Rule 2: gt done IS NOT FOR EARLY EXIT

`gt done` closes the bead, the convoy, and exits the polecat. Only
call `gt done` when ALL OF THESE are true:

- `cycles_completed >= {{cycles}}` (you actually finished), OR
- The budget guard halted further phases (look for "[gate] *-budget:
  SKIP: would cost N¢ but only K¢ remaining" in the trend log; verify
  by reading `.metabolism-budget.json`'s `spent_cents >= cap`).

If neither is true, you have remaining work. DO NOT call gt done.

### Rule 3: HANDOFF, DON'T DONE, WHEN CONTEXT IS FILLING

If your session context is approaching capacity (~80% full), DO NOT
call gt done. Instead:

```bash
gt handoff -s "metabolism patrol handoff (cycle $cycles_completed/{{cycles}})" \
  -m "Resume from .metabolism-tick-progress in polecat clone. Budget at $(cat .metabolism-budget.json | jq -r .spent_cents)¢. Next batch starts at cycle $((cycles_completed+1))."
```

This exits cleanly while keeping the bead hooked. The daemon will
respawn a fresh polecat session; that session will see the same bead
on its hook, re-enter this step, read `.metabolism-tick-progress`, and
resume from where you left off.

### The actual loop

Each cycle does everything: sense → evaluate → ingest → dream → trip →
calibrate. The KB grows autonomously.

```bash
# Source .env with auto-export so the cap and Kagi key propagate too.
RIG_ROOT="$(git worktree list --porcelain | head -1 | sed 's/worktree //')"
if [ -f .env ]; then set -a; source .env; set +a
elif [ -f "$RIG_ROOT/.env" ]; then set -a; source "$RIG_ROOT/.env"; set +a
fi

SLEEP_SECONDS="{{sleep_seconds}}"
GATE_OVERRIDES="{{gate_overrides}}"
# Use the pre-built binary from the setup step (much smaller RSS than
# `go run`, which compiles + links every invocation). Falls back to
# `go run` if the binary isn't there for any reason.
METABOLISM_BIN="./metabolism"
if [ ! -x "$METABOLISM_BIN" ]; then
  echo "WARN: pre-built metabolism binary missing, falling back to 'go run' (higher memory pressure)"
  METABOLISM_BIN="go run ./cmd/metabolism"
fi
for i in $(seq 1 {{cycles}}); do
  echo "=== Cycle $i of {{cycles}} (sleep ${SLEEP_SECONDS}s between) ==="
  # shellcheck disable=SC2086 — GATE_OVERRIDES is a deliberate space-split flag list
  $METABOLISM_BIN --evolve $GATE_OVERRIDES .

  # Surface the post-cycle spend + signal trend so the formula log makes
  # unattended runs auditable. Phase gates self-throttle the expensive
  # work; the budget guard cuts off at METABOLISM_BUDGET_CENTS.
  $METABOLISM_BIN --calibrate-trend . 2>&1 | tail -3

  # Commit and push directly to main after each cycle.
  # NOTE: .metabolism-log.json, .metabolism-budget.json, and
  # .metabolism-calibration.jsonl are gitignored (runtime state).
  # predictions.go and metabolism_cycle*.go are the evolving corpus.
  #
  # Branch protection allows direct push: required_status_checks dropped
  # 2026-04-26 because the formula already runs build/vet/lint locally
  # and CI was a duplicate gate. Force-push and deletion still blocked.
  # If push fails (race or rebase needed), retry once after fetch+rebase.
  git add predictions.go metabolism_cycle*.go 2>/dev/null
  if ! git diff --cached --quiet; then
    git commit -m "metabolism patrol: cycle $i/{{cycles}} — autonomous evolution"
    git fetch origin main
    git rebase origin/main || { echo "rebase failed — leaving branch; will retry next cycle"; git rebase --abort; continue; }
    if ! git push origin HEAD:main; then
      echo "Direct push failed — fetching + retrying once"
      git fetch origin main && git rebase origin/main && git push origin HEAD:main || echo "Push still failed; corpus changes left on local branch for next cycle"
    fi
  else
    echo "No corpus changes this cycle"
  fi

  echo "=== Cycle $i complete ==="
  echo

  # Sleep before next iteration (skip after the last one).
  if [ "$i" -lt "{{cycles}}" ]; then
    echo "Sleeping ${SLEEP_SECONDS}s before next cycle..."
    sleep "$SLEEP_SECONDS"
  fi
done
```

**If a cycle fails:** Note the error, skip to submit. Do not retry — the
cycle is designed to be idempotent and the next patrol will pick up where
this one left off.

**Exit criteria:** All requested cycles completed or first failure noted."""

[[steps]]
id = "submit"
title = "Report and exit"
needs = ["run-cycles"]
description = """
**1. Final state check:**
```bash
go build ./...
go run ./cmd/query --stats .
git log --oneline -5
```

**2. Update bead with results:**
```bash
bd update {{issue}} --notes "Completed {{cycles}} metabolism cycles"
```

**3. Push and exit:**
```bash
git push
gt done
```

Done means gone."""

[vars]
[vars.issue]
description = "The bead tracking this patrol run"
required = true

[vars.cycles]
description = "Number of sleep cycles to run before exiting (with hourly sleeps the default 168 = ~1 week of unattended operation; polecat handoffs to a fresh session if context fills first)"
default = "168"

[vars.sleep_seconds]
description = "Seconds to sleep between cycles. 3600 = hourly. Phase gates self-throttle so most ticks are mostly cheap; the budget guard caps total monthly spend."
default = "3600"

[vars.gate_overrides]
description = "Extra flags appended to `--evolve` to override the default phase gates. Empty by default (use the cost-aware gates). For visible-flow demos, pass e.g. `--sense-min-hours=0 --resolve-min-unresolved=1 --trip-min-hours=0 --ingest-min-corroborated=1` so every cycle does real work. Costs ~$0.05-0.30/cycle; budget guard still caps the month."
default = ""

[vars.base_branch]
description = "Branch to work on"
default = "main"
