name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint (deterministic rules)
        run: go run ./cmd/lint .

      # cmd/topology smoke-runs against the real corpus, but it needs a
      # populated defn database. CI doesn't provision one, so skip the
      # binary smoke and rely on cmd/topology unit tests for coverage.
