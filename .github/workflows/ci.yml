name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Install the defn CLI and ingest the corpus into an embedded .defn/
      # so cmd/query, cmd/topology, and the metabolism integration tests
      # can do real work in CI instead of skipping. Pinned to the same
      # version this repo depends on (go.mod). Cache GOMODCACHE+GOBIN so
      # the install is fast on warm builds; the ingest itself is ~3 min
      # cold and unavoidable until the corpus content is unchanged across
      # runs (a separate caching pass can address that later).
      - name: Install defn CLI
        run: go install github.com/justinstimatze/defn/cmd/defn@v0.11.3

      - name: Ingest corpus into embedded defn
        run: defn ingest .

      - name: Test
        run: go test ./...

      - name: Lint (deterministic rules)
        run: go run ./cmd/lint .

      - name: Topology
        run: go run ./cmd/topology .
