<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Winze — fleet</title>
<style>
  :root{
    color-scheme: dark;
    /* rock & vellum — a survey sheet read by lamplight underground, not a neon HUD */
    --rock:#141009; --seam:#1b150d; --face:#0d0a05;
    --rule:#4a3a22; --rule-hi:#6d5531;
    --ink:#e9dec6; --dim:#a2916c; --faint:#5f5236;
    /* vein assay states */
    --brass:#c0a25e;      /* typed claim — assayed vein */
    --copper:#4fa39a;     /* latent [[wikilink]] — unassayed seam */
    --hematite:#c0503a;   /* dispute — fault */
    --amethyst:#9a72c4;   /* conjecture — prospect */
    /* recency temperature */
    --warm:#d69a44; --cold:#3f6a86;
    --mono: ui-monospace,"JetBrains Mono","Cascadia Code","SF Mono",Menlo,Consolas,monospace;
    --serif: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      /* faint survey grid + contour hatch on rock */
      repeating-linear-gradient(0deg, transparent 0 46px, rgba(109,85,49,.05) 46px 47px),
      repeating-linear-gradient(90deg, transparent 0 46px, rgba(109,85,49,.05) 46px 47px),
      repeating-linear-gradient(45deg, transparent 0 13px, rgba(74,58,34,.035) 13px 14px),
      radial-gradient(1400px 900px at 82% -10%, #241a0e 0%, transparent 62%),
      var(--rock);
    color:var(--ink); font-family:var(--mono);
    height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* ---- title block ---- */
  header{
    display:flex; align-items:baseline; gap:1.3rem; flex-wrap:wrap;
    padding:.6rem 1.1rem .55rem; border-bottom:1px double var(--rule);
    background:linear-gradient(#1a140c,#120d07);
  }
  .mark{font-family:var(--serif); font-size:1.5rem; line-height:1; letter-spacing:.01em; color:#f2e9d2}
  .sheet{font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dim)}
  .sheet .em{color:var(--copper)}
  .agg{margin-left:auto; display:flex; gap:1.2rem; font-size:.7rem; color:var(--dim)}
  .agg b{color:var(--ink); font-variant-numeric:tabular-nums}
  .agg .st{color:var(--warm)}
  .clock{color:var(--copper)}
  /* mineral key */
  .key{display:flex; gap:1.15rem; font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:var(--faint);
    padding:.32rem 1.1rem; border-bottom:1px solid var(--rule); flex-wrap:wrap; align-items:center}
  .key span{display:inline-flex; align-items:center; gap:.4rem}
  .key .sw{width:1.1rem; height:0; border-top-width:2px; border-top-style:solid; display:inline-block}
  .key .dot{width:.5rem; height:.5rem; border-radius:50%; display:inline-block}
  /* ---- sheet grid ---- */
  #fleet{
    flex:1; display:grid; gap:.7rem; padding:.75rem 1.1rem 1rem;
    grid-template-columns:2fr 1fr; grid-auto-rows:1fr; min-height:0;
  }
  .cell{
    position:relative; border:1px solid var(--rule); overflow:hidden; min-height:0;
    background:radial-gradient(130% 130% at 50% 0%, #17110a 0%, var(--face) 72%);
    box-shadow:inset 0 0 0 3px var(--rock), inset 0 0 0 4px rgba(109,85,49,.28); /* double-rule drawing frame */
  }
  .cell.hero{grid-row:1 / span 2}
  /* corner registration ticks */
  .cell .tick{position:absolute; width:9px; height:9px; border:1px solid var(--rule-hi); z-index:3; opacity:.7}
  .cell .tick.tl{top:5px;left:5px;border-right:0;border-bottom:0}
  .cell .tick.tr{top:5px;right:5px;border-left:0;border-bottom:0}
  .cell .tick.bl{bottom:5px;left:5px;border-right:0;border-top:0}
  .cell .tick.br{bottom:5px;right:5px;border-left:0;border-top:0}
  .cell canvas{position:absolute; inset:0; width:100%; height:100%; display:block}
  .cell-hd{position:absolute; top:0; left:0; right:0; z-index:2; display:flex; align-items:baseline; gap:.55rem;
    padding:.55rem .8rem .4rem; pointer-events:none}
  .cell-name{font-family:var(--serif); font-size:1.05rem; color:#f2e9d2; letter-spacing:.01em}
  .cell-kind{font-size:.58rem; text-transform:uppercase; letter-spacing:.16em; color:var(--brass)}
  .cell-status{margin-left:auto; font-size:.62rem; letter-spacing:.08em; text-transform:uppercase; color:var(--dim)}
  .cell-tel{position:absolute; bottom:0; left:0; right:0; z-index:2; display:flex; align-items:center; gap:1rem;
    padding:.4rem .8rem .5rem; font-size:.64rem; color:var(--dim); pointer-events:none;
    background:linear-gradient(transparent, rgba(13,10,5,.82) 55%)}
  .cell-tel b{color:var(--ink); font-variant-numeric:tabular-nums}
  .cell-tel .chip{margin-left:auto; font-size:.58rem; font-weight:700; letter-spacing:.05em;
    padding:.06rem .42rem; border:1px solid var(--rule-hi); color:var(--brass)}
  footer{font-size:.58rem; color:var(--faint); letter-spacing:.03em; padding:.4rem 1.1rem .5rem;
    border-top:1px solid var(--rule); text-align:center}
  footer b{color:var(--dim)}
  .live{color:var(--copper)} .live.stale{color:var(--faint)}
  /* a cell glows warm while its winze is actually mid-cycle (real cycle_start event) */
  .cell.active{box-shadow:inset 0 0 0 3px var(--rock), inset 0 0 0 4px rgba(214,154,68,.5)}
  /* overlay for real meld bridges — pin CSS size so device coords map right */
  #meld-overlay{position:fixed; inset:0; width:100%; height:100%; z-index:5; pointer-events:none}
  .meld-label{position:fixed; z-index:6; font-family:var(--mono); font-size:.62rem; letter-spacing:.08em;
    color:var(--warm); text-shadow:0 0 12px var(--warm); pointer-events:none; opacity:0; transition:opacity .4s}
  @media (max-width:760px){
    body{height:auto; min-height:100dvh; overflow-y:auto}
    #fleet{grid-template-columns:1fr; grid-auto-rows:minmax(240px,58vh)}
    .cell.hero{grid-row:auto}
    .agg{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="mark">Winze</div>
  <div class="sheet">fleet</div>
  <div class="agg">
    <span>instances <b id="a-inst">0</b></span>
    <span>entities <b id="a-ent">0</b></span>
    <span>claims <b id="a-cl">0</b></span>
    <span>budget <b id="a-spend">0</b>¢</span>
    <span class="st" id="a-state">—</span>
    <span class="clock" id="clock">--:--:--</span>
    <span>· structure <span class="live" id="live">live</span></span>
  </div>
</header>
<div class="key" id="key"></div>
<div id="fleet"></div>
<canvas id="meld-overlay" aria-hidden="true"></canvas>
<div class="meld-label" id="meld-label"></div>
<footer>
  <b>solid lines</b> are typed claims, <b>dashed</b> are latent [[wikilinks]], <b>purple</b> are conjectures ·
  glow shows how recently each winze ran
</footer>

<script src="/app.js"></script>
</body>
</html>
